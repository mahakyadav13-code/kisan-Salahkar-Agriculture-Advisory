{% extends "base.html" %}
{% block title %}Community Forum — Kisan Salahkar{% endblock %}

{% block content %}
<section class="hero hero-sm hero-forum">
    <div class="hero-bg-img" style="background-image:url('https://images.unsplash.com/photo-1605000797499-95a51c5269ae?w=1400&h=400&fit=crop');"></div>
    <div class="hero-overlay"></div>
    <div class="hero-content">
        <div class="breadcrumb"><a href="/dashboard"><i class="fa-solid fa-house"></i> Home</a> <span class="sep">/</span> <span>Forum</span></div>
        <div class="page-header-icon"><i class="fa-solid fa-comments"></i></div>
        <h1><span data-i18n="forumTitle">Farmer Community Forum</span></h1>
        <p data-i18n="forumSub">Ask questions, share farming experiences &amp; connect with fellow farmers</p>
    </div>
</section>

<section class="section">
    <!-- New Post Form -->
    <div class="forum-new-post">
        <h2><i class="fa-solid fa-pen-to-square"></i> <span data-i18n="forumNewPost">Ask a Question / Share</span></h2>
        <form id="forumPostForm">
            <div class="form-grid">
                <div class="input-group">
                    <label data-i18n="forumPostTitle">Title</label>
                    <input type="text" id="postTitle" placeholder="What's your question?" required>
                </div>
                <div class="input-group">
                    <label data-i18n="forumCategory">Category</label>
                    <select id="postCategory">
                        <option value="general">General (सामान्य)</option>
                        <option value="crop">Crop Issues (फसल समस्या)</option>
                        <option value="pest">Pest/Disease (कीट/रोग)</option>
                        <option value="market">Market/Selling (बाज़ार)</option>
                        <option value="govt">Govt Schemes (सरकारी योजना)</option>
                        <option value="equipment">Equipment (उपकरण)</option>
                    </select>
                </div>
            </div>
            <div class="input-group" style="margin-top:.5rem;">
                <label data-i18n="forumContent">Details</label>
                <textarea id="postContent" rows="4" placeholder="Describe your question or experience in detail..." required></textarea>
            </div>
            <button type="submit" class="btn btn-primary">
                <i class="fa-solid fa-paper-plane"></i> <span data-i18n="forumSubmit">Post</span>
            </button>
        </form>
    </div>

    <!-- Category Filter -->
    <div class="forum-filters">
        <button class="filter-btn active" data-cat="" data-i18n="forumAll">All</button>
        <button class="filter-btn" data-cat="crop">🌾 <span data-i18n="forumCatCrop">Crop</span></button>
        <button class="filter-btn" data-cat="pest">🐛 <span data-i18n="forumCatPest">Pest</span></button>
        <button class="filter-btn" data-cat="market">💰 <span data-i18n="forumCatMarket">Market</span></button>
        <button class="filter-btn" data-cat="govt">🏛️ <span data-i18n="forumCatGovt">Schemes</span></button>
        <button class="filter-btn" data-cat="general">💬 <span data-i18n="forumCatGeneral">General</span></button>
    </div>

    <!-- Posts List -->
    <div id="forumPosts" class="forum-posts"></div>
</section>

<!-- Reply Modal -->
<div id="replyModal" class="modal" style="display:none;">
    <div class="modal-content">
        <div class="modal-header">
            <h3><i class="fa-solid fa-reply"></i> <span data-i18n="forumReply">Reply</span></h3>
            <button class="modal-close" onclick="closeReplyModal()">&times;</button>
        </div>
        <div id="replyPostContent" class="reply-original"></div>
        <div id="repliesList" class="replies-list"></div>
        <form id="replyForm">
            <input type="hidden" id="replyPostId">
            <div class="input-group">
                <textarea id="replyContent" rows="3" placeholder="Write your reply..." required></textarea>
            </div>
            <button type="submit" class="btn btn-primary">
                <i class="fa-solid fa-paper-plane"></i> <span data-i18n="forumSendReply">Send Reply</span>
            </button>
        </form>
    </div>
</div>
{% endblock %}
